<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11번가 웹 스크래퍼</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 800px;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .input-group {
            margin-bottom: 20px;
        }
        input {
            padding: 12px;
            font-size: 16px;
            width: 100%;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #ff4b4b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #e64444;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #loading {
            display: none;
            margin: 20px 0;
            color: #666;
        }
        #resultContainer {
            margin-top: 20px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 5px;
            display: none;
        }
        #errorContainer {
            color: red;
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ffcdd2;
            background-color: #ffebee;
            border-radius: 5px;
            display: none;
        }
        .review-item {
            margin: 15px 0;
            padding: 15px;
            background-color: white;
            border: 1px solid #eee;
            border-radius: 5px;
        }
        .review-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        .review-content {
            margin: 10px 0;
            line-height: 1.5;
        }
        .review-rating {
            color: #ff4b4b;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>11번가 상품 정보 크롤러</h2>
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="11번가 상품 URL을 입력하세요">
            <button onclick="scrapeData()" id="scrapeButton">크롤링 시작</button>
        </div>
        <div id="loading">크롤링 중... 잠시만 기다려주세요.</div>
        <div id="errorContainer"></div>
        <div id="resultContainer">
            <h3>크롤링 결과</h3>
            <div id="productTitle"></div>
            <div id="reviews"></div>
        </div>
    </div>

    <script>
        async function scrapeData() {
            const urlInput = document.getElementById('urlInput');
            const scrapeButton = document.getElementById('scrapeButton');
            const loading = document.getElementById('loading');
            const errorContainer = document.getElementById('errorContainer');
            const resultContainer = document.getElementById('resultContainer');
            const productTitle = document.getElementById('productTitle');
            const reviews = document.getElementById('reviews');

            const url = urlInput.value.trim();
            if (!url) {
                errorContainer.textContent = 'URL을 입력해주세요.';
                errorContainer.style.display = 'block';
                return;
            }

            // UI 초기화
            errorContainer.style.display = 'none';
            resultContainer.style.display = 'none';
            loading.style.display = 'block';
            scrapeButton.disabled = true;

            try {
                const response = await fetch('http://localhost:3000/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) {
                    throw new Error('서버에서 오류가 발생했습니다.');
                }

                const data = await response.json();
                
                if (data.title && data.reviews) {
                    productTitle.innerHTML = `<h4>상품명:</h4><p>${data.title}</p>`;
                    
                    // 리뷰 데이터 표시
                    reviews.innerHTML = '<h4>리뷰:</h4>' + data.reviews.map(review => `
                        <div class="review-item">
                            <div class="review-meta">
                                <span class="review-rating">평점: ${review.rating}</span> | 
                                작성자: ${review.reviewer} | 
                                작성일: ${review.date}
                            </div>
                            <div class="review-meta">
                                옵션: ${review.options}
                            </div>
                            <div class="review-content">
                                ${review.content}
                            </div>
                        </div>
                    `).join('');
                    
                    resultContainer.style.display = 'block';
                } else {
                    errorContainer.textContent = "데이터를 가져오는 데 실패했습니다.";
                    errorContainer.style.display = 'block';
                }
            } catch (error) {
                errorContainer.textContent = "오류 발생: " + error.message;
                errorContainer.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                scrapeButton.disabled = false;
            }
        }
    </script>
</body>
</html>
